<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="512" cy="-57" r="62" fill="#1d4ed8" opacity="0.14"/>
    <circle cx="770" cy="493" r="25" fill="#1d4ed8" opacity="0.14"/>
    <circle cx="1024" cy="37" r="20" fill="#1d4ed8" opacity="0.16"/>
    <circle cx="795" cy="418" r="87" fill="#1d4ed8" opacity="0.15"/>
    <circle cx="689" cy="404" r="97" fill="#1d4ed8" opacity="0.08"/>
    <circle cx="837" cy="516" r="50" fill="#1d4ed8" opacity="0.07"/>
    <rect x="-95" y="651" width="67" height="96" rx="8" fill="#2563eb" opacity="0.07" transform="rotate(41, 2, 704)"/>
    <rect x="1288" y="264" width="73" height="25" rx="8" fill="#2563eb" opacity="0.03" transform="rotate(26, 747, 523)"/>
    <rect x="390" y="397" width="22" height="97" rx="8" fill="#2563eb" opacity="0.14" transform="rotate(20, 256, 236)"/>
    <rect x="1165" y="264" width="74" height="54" rx="8" fill="#2563eb" opacity="0.08" transform="rotate(9, 1231, 75)"/>
    <rect x="754" y="705" width="65" height="79" rx="8" fill="#2563eb" opacity="0.08" transform="rotate(10, 61, 92)"/>
    <rect x="754" y="-56" width="36" height="79" rx="8" fill="#2563eb" opacity="0.09" transform="rotate(37, 212, 390)"/>
    <rect x="149" y="311" width="41" height="67" rx="8" fill="#2563eb" opacity="0.04" transform="rotate(9, 647, 529)"/>
    <rect x="101" y="289" width="63" height="27" rx="8" fill="#2563eb" opacity="0.15" transform="rotate(26, 348, 18)"/>
    <polygon points="126,-157 207,5 45,5" fill="#1d4ed8" opacity="0.12"/>
    <polygon points="1268,135 1346,291 1190,291" fill="#1d4ed8" opacity="0.05"/>
    <polygon points="963,-114 1056,72 870,72" fill="#1d4ed8" opacity="0.10"/>
    <polygon points="732,324 774,408 690,408" fill="#1d4ed8" opacity="0.12"/>

  <!-- Wave at bottom -->
  <path d="M0,548 C360,589 840,507 1200,548 L1200,630 L0,630Z" fill="#1d4ed8" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    Karuizawa resort 안내
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    Karuizawa — 정보
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#f59e0b" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    Karuizawa Karuizawa resort 안내 — 정보
  </text>
</svg>